workflows:
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Ensure Android Flutter scaffold
        script: flutter create --platforms=android --project-name bak_pdf_app .
      - name: Ensure AndroidX is enabled
        script: |
          printf '%s\n' \
            'org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError' \
            'android.useAndroidX=true' \
            'android.enableJetifier=true' > android/gradle.properties
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/logs/*.log
